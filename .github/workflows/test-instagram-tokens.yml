name: Test - Instagram Tokens

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-instagram-token:
    runs-on: ubuntu-latest

    env:
      IG_USER_ID: ${{ secrets.IG_USER_ID }}
      IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
      LONDON_IG_USER_ID: ${{ secrets.LONDON_IG_USER_ID }}
      LONDON_IG_ACCESS_TOKEN: ${{ secrets.LONDON_IG_ACCESS_TOKEN }}
      MANCHESTER_IG_USER_ID: ${{ secrets.MANCHESTER_IG_USER_ID }}
      MANCHESTER_IG_ACCESS_TOKEN: ${{ secrets.MANCHESTER_IG_ACCESS_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Test Instagram Tokens
        shell: python
        run: |
          import os
          import requests
          import sys
          tests = [
              ("tokyo", os.environ.get("IG_USER_ID"), os.environ.get("IG_ACCESS_TOKEN")),
              ("london", os.environ.get("LONDON_IG_USER_ID"), os.environ.get("LONDON_IG_ACCESS_TOKEN")),
              ("manchester", os.environ.get("MANCHESTER_IG_USER_ID"), os.environ.get("MANCHESTER_IG_ACCESS_TOKEN")),
          ]

          failures = []

          for city, user_id, token in tests:
              print(f"Testing {city.upper()} Instagram token...")
              print(f"   User ID: {user_id if user_id else 'NOT SET'}")
              print(f"   Token: {'SET' if token else 'NOT SET'}")

              if not token or not user_id:
                  print("   Secrets not configured.")
                  failures.append(city)
                  continue

              url = f"https://graph.facebook.com/v21.0/{user_id}"
              params = {
                  "fields": "id,username",
                  "access_token": token,
              }

              try:
                  response = requests.get(url, params=params, timeout=30)
                  data = response.json()
              except Exception as e:
                  print(f"   Request failed: {e}")
                  failures.append(city)
                  continue

              if "error" in data:
                  print(f"   Token error: {data['error'].get('message', 'Unknown error')}")
                  failures.append(city)
                  continue

              print("   Token valid.")
              print(f"   Instagram ID: {data.get('id')}")
              print(f"   Username: {data.get('username')}")

          if failures:
              print("Failed cities: " + ", ".join(failures))
              sys.exit(1)

          print("All Instagram tokens are working.")
